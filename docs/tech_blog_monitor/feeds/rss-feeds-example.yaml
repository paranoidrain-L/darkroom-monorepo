  - name: AWS Machine Learning Blog
    url: https://aws.amazon.com/blogs/machine-learning/feed/
    category: 深度技术

  - name: BAIR Blog
    url: https://bair.berkeley.edu/blog/feed.xml
    category: 深度技术

  - name: Netflix Tech Blog
    url: https://netflixtechblog.com/feed
