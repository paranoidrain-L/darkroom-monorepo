name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check runtime products/tech_blog_monitor

      - name: Pytest
        run: uv run pytest -q runtime/test products/tech_blog_monitor/test --ignore=products/tech_blog_monitor/test/test_postgres_integration.py
